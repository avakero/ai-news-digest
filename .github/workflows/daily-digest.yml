name: 🤖 AI News Digest（毎朝自動配信）

on:
  schedule:
    # 毎朝 6:00 AM JST（= UTC 21:00 前日）
    - cron: '0 21 * * *'
  # GitHubの画面から手動実行も可能
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: AIニュースダイジェストを送信
        env:
          # ── AIプロバイダー設定 ──────────────────────────────
          # "gemini"（デフォルト）/ "anthropic" / "straico" を指定
          AI_PROVIDER:        ${{ vars.AI_PROVIDER || 'gemini' }}
          # Anthropic Claude を使う場合（デフォルトモデル: claude-sonnet-4-6）
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:    ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          # Google Gemini を使う場合
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          # Geminiのモデル名（デフォルト: gemini-2.5-flash）
          GEMINI_MODEL:       ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          # Straico を使う場合
          STRAICO_API_KEY:    ${{ secrets.STRAICO_API_KEY }}
          # Straicoのモデル名（デフォルト: openai/gpt-4o-mini）
          STRAICO_MODEL:      ${{ vars.STRAICO_MODEL || 'openai/gpt-4o-mini' }}
          # ── Gmail設定 ──────────────────────────────────────
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python src/main.py
